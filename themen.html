<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Übersicht über die Themen." />
        <title>Blog – Themen (v3)</title>
        <link rel="stylesheet" href="assets/css/styles.css?v=3" />
        <script src="assets/js/themes.js?v=3" defer></script>
    </head>
    <body data-page="themen">
        <header class="header">
            <div class="header-inner">
                <span class="header-title">MeinBlog</span>
                <nav class="header-nav">
                    <a href="index.html">START</a>
                    <a href="themes.html">THEMEN</a>
                </nav>
            </div>
        </header>

        <main class="content">
            <div style="padding:12px 16px; background:#0f172a; border:1px solid #66c0f4; color:#fff; margin-bottom:16px; border-radius:12px; font-weight:700;">
                Debug: themen.html (v3) geladen
            </div>
            <div id="theme-status" style="padding:10px 14px; background:#1f2a3a; border:1px solid rgba(102,192,244,0.25); color:#c6d4df; margin-bottom:16px; border-radius:10px;">
                Status: Lade...
            </div>
            <div id="theme-list" class="theme-list">
                <section class="card" data-theme-id="fotografie">
                    <div class="card-image"></div>
                    <div class="card-label">Fotografie</div>
                </section>
                <section class="card" data-theme-id="musik">
                    <div class="card-image"></div>
                    <div class="card-label">Musik</div>
                </section>
                <section class="card" data-theme-id="sport">
                    <div class="card-image"></div>
                    <div class="card-label">Sport</div>
                </section>
            </div>

            <section id="theme-result" class="theme-result" hidden>
                <div class="theme-result-header">
                    <button id="back-to-themes" class="button-secondary">Zurück zu Themen</button>
                </div>
                <ul id="theme-articles" class="artikel-liste"></ul>
            </section>
        </main>

        <footer class="footer">
            <div class="footer-inner">
                <a href="kontakt.html">KONTAKT</a>
            </div>
        </footer>
    </body>
</html>
