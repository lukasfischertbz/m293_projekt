<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kontaktseite" />
    <title>Blog – Kontakt</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body data-page="kontakt">
    <header class="header">
      <div class="header-inner">
        <span class="header-title">MeinBlog</span>
        <nav class="header-nav">
          <a href="index.html">START</a>
          <a href="themes.html">THEMEN</a>
        </nav>
      </div>
    </header>

    <main class="content">
      <section class="card">
        <div class="card-label">KONTAKT</div>
        <form id="kontakt-formular">
          <input type="text" name="name" placeholder="Name" required />
          <input type="email" name="email" placeholder="E-Mail" required />
          <select name="betreff" required>
            <option value="" disabled selected>Betreff wählen</option>
            <option value="frage">Allgemeine Frage</option>
            <option value="feedback">Feedback</option>
            <option value="zusammenarbeit">Zusammenarbeit</option>
            <option value="fehler">Fehler melden</option>
            <option value="sonstiges">Sonstiges</option>
          </select>
          <textarea name="nachricht" placeholder="Nachricht" required></textarea>
          <button type="submit">Senden</button>
        </form>
        <div id="kontakt-status"></div>
      </section>

      <section class="card">
        <div class="card-label">NEWSLETTER</div>
        <form id="newsletter-formular">
          <input type="email" name="email" placeholder="E-Mail-Adresse" required />
          <button type="submit">Anmelden</button>
        </form>
        <div id="newsletter-status"></div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <a href="kontakt.html">KONTAKT</a>
      </div>
    </footer>

    <script src="assets/js/newsletter.js"></script>
  </body>
</html>
