<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Blog – Home</title>
        <link rel="stylesheet" href="assets/css/styles.css" />
        <script type="module" src="assets/js/index.js"></script>
    </head>
    <body data-page="index">
        <header class="header">
            <div class="header-inner">
                <span class="header-title">MeinBlog</span>
                <nav class="header-nav">
                    <a href="index.html">START</a>
                    <a href="themes.html">THEMEN</a>
                </nav>
            </div>
        </header>

        <main class="page">
            <div class="page-labels">
                <div class="label-themen">AKTUELLE THEMEN</div>
                <div class="label-stat">
                    <span id="stat-count">—</span>
                    <span>ARTIKEL</span>
                </div>
            </div>
            <ul id="artikel-liste" class="artikel-liste"></ul>

            <section class="newsletter-strip">
                <h2>Newsletter</h2>
                <p>Bleib auf dem Laufenden – neue Artikel direkt in dein Postfach.</p>
                <form id="newsletter-formular">
                    <input type="email" name="email" placeholder="E-Mail-Adresse" required />
                    <button type="submit">Anmelden</button>
                </form>
                <div id="newsletter-status"></div>
            </section>
        </main>

        <template id="template-artikel-card">
            <li class="artikel-card">
                <div class="artikel-image">
                    <div class="artikel-image--placeholder"></div>
                    <img src="" alt="" hidden />
                </div>
                <div class="artikel-title"><a href="#">Titel</a></div>
            </li>
        </template>

        <footer class="footer">
            <div class="footer-inner">
                <a href="kontakt.html">KONTAKT</a>
            </div>
        </footer>

        <script src="assets/js/newsletter.js"></script>
    </body>
</html>
